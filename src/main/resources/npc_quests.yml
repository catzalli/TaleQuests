enabled: true

# Control which default (lang) messages are sent to the PLAYER when no custom message is set on the quest/chain.
# If a quest has a custom message configured, it is ALWAYS sent regardless of these settings.
# Set to false to suppress a specific default message type entirely.
default_messages:
  prerequisite: true
  already_completed: true
  chain_already_completed: true
  started: true
  progress: true
  completed: true

quests:
  npc_silas_1:
    name: Broken Fences
    description: Collect 20 Oak Logs to fix the barn.
    icon_id: Wood_Oak_Trunk
    weight: 1.0
    remove_items: true
    messages:
      start: '<gold>Old Man Silas: <white>Eh? Who''re you? Don''t just stand there gawkin''. The storm bust up my fences! Go fetch me <green>20 Oak Logs<white> if yer lookin'' to be useful.'
      progress: '<gold>Old Man Silas: <white>Is that it? My back aches just watchin'' you. I need <yellow>{total} logs<white>, chop chop!'
      complete: '<gold>Old Man Silas: <white>Hmph. Not bad work for a city slicker. Here''s a lil'' somethin'' for yer trouble.'
      already_completed: '<gold>Old Man Silas: <white>You already helped me with this, remember? Go on now, I ain''t got more work for ya on that.'
    requirements:
      - type: HAVE_ITEM
        target: Wood_Oak_Trunk
        amount: 20
    rewards:
      - type: MONEY
        value: '50'
      - type: ITEM
        value: Food_Pie_Apple:3
  npc_silas_2:
    name: Winter is Coming
    description: Harvest 30 Wheat for the silo.
    icon_id: Plant_Crop_Wheat_Item
    weight: 2.0
    remove_items: true
    prerequisites:
      - npc_silas_1
    messages:
      prerequisite: '<gold>Old Man Silas: <white>Hold yer horses! You ain''t even fixed my fences yet! Come back when you''ve finished that first, will ya?'
      start: '<gold>Old Man Silas: <white>Fence is up, but the animals gotta eat! Winter''s comin'' fast. Get to the fields and bring in <green>30 Wheat<white>. Don''t trample ''em!'
      progress: '<gold>Old Man Silas: <white>You call that a harvest? The silo is empty! Get back to work, I need <green>{total} wheat<white>.'
      complete: '<gold>Old Man Silas: <white>Alright, alright. That''ll do. Maybe you ain''t so useless after all, kid.'
    requirements:
      - type: HAVE_ITEM
        target: Plant_Crop_Wheat_Item
        amount: 30
    rewards:
      - type: MONEY
        value: '200'
      - type: ITEM
        value: Food_Bread:10
      - type: ITEM
        value: Armor_Iron_Hands:1
  npc_silas_3:
    name: Pesky Moles
    description: Kill 5 Moles (or similar pest like rats).
    icon_id: Tool_Hoe_Iron
    weight: 3.0
    prerequisites:
      - npc_silas_2
    messages:
      prerequisite: '<gold>Old Man Silas: <white>Not so fast! You still owe me that harvest! Go finish ''<yellow>{required_quest}<white>'' first!'
      start: '<gold>Old Man Silas: <white>Dang varmints! Those nasty critters are diggin'' under my porch! Grab yer weapon and squash <green>5 of ''em<white> before my house collapses!'
      progress: '<gold>Old Man Silas: <white>I can still hear ''em scratchin! You got <yellow>{current}<white>. Git back in there!'
      complete: '<gold>Old Man Silas: <white>Silence... finally. You did good, kid. You''re always welcome on Silas''s farm. Take this heirloom.'
    requirements:
      - type: KILL_MOB
        target: Rat,Molerat
        amount: 5
    rewards:
      - type: MONEY
        value: '450'
      - type: ITEM
        value: Tool_Hoe_Iron:1
      - type: COMMAND
        value: say {player} has earned the trust of the farmers!
        display_name: 'Title: Farmhand'
  npc_elara_1:
    name: Wolf Hunt
    description: Hunt 5 Wolves to collect teeth for Elara's research.
    icon_id: Tool_Sap_Shunt
    weight: 10.0
    messages:
      start: '<aqua>Apprentice Elara: <white>U-um... excuse me? I''m trying to brew a potion, but I''m missing a key ingredient: <green>Wolf Teeth<white>. I''m too scared to go near them. Could you hunt <green>5 Wolves<white> and bring me their teeth?'
      progress: '<aqua>Apprentice Elara: <white>H-have you collected the teeth yet? I really need them for my experiment. You have hunted <yellow>{current}<white> wolves so far.'
      complete: '<aqua>Apprentice Elara: <white>Eek! Those are sharp! B-but... yes, these are exactly what I needed. Thank you so much!'
    requirements:
      - type: KILL_MOB
        target: Wolf_Black,Wolf_White
        amount: 5
    rewards:
      - type: MONEY
        value: '75'
      - type: ITEM
        value: Potion_Regen_Health:1
  npc_elara_2:
    name: Magical Flora
    description: Gather 10 Glowing Mushrooms for a potion.
    icon_id: Plant_Crop_Mushroom_Glowing_Red
    weight: 11.0
    prerequisites:
      - npc_elara_1
    messages:
      prerequisite: '<aqua>Apprentice Elara: <white>O-oh, h-hello again... I still need those wolf teeth first. Could you finish that hunt for me?'
      start: '<aqua>Apprentice Elara: <white>S-sorry to bother you again... but I need to brew a calming potion. C-could you find <green>10 Glowing Mushrooms<white> in the caves?'
      progress: '<aqua>Apprentice Elara: <white>I-I don''t mean to rush you... but do you have the mushrooms? Oh, you have found only <yellow>{current}<white>.'
      complete: '<aqua>Apprentice Elara: <white>Wow... these are perfect! You are v-very brave to go into the caves.'
    requirements:
      - type: HAVE_ITEM
        target: Plant_Crop_Mushroom_Glowing_Blue,Plant_Crop_Mushroom_Glowing_Green,Plant_Crop_Mushroom_Glowing_Orange,Plant_Crop_Mushroom_Glowing_Purple,Plant_Crop_Mushroom_Glowing_Red,Plant_Crop_Mushroom_Glowing_Violet
        amount: 10
    rewards:
      - type: MONEY
        value: '300'
      - type: ITEM
        value: Potion_Antidote:1
      - type: ITEM
        value: Furniture_Royal_Magic_Carpet:1
  npc_elara_3:
    name: The Ritual
    description: Craft a Flame Crystal Staff for Elara.
    icon_id: Weapon_Staff_Crystal_Flame
    weight: 12.0
    prerequisites:
      - npc_elara_2
    messages:
      start: '<aqua>Apprentice Elara: <white>I think I''m r-ready to cast my first real spell! But... I broke my wand. Could you craft a <green>Flame Crystal Staff<white> for me? P-please?'
      progress: '<aqua>Apprentice Elara: <white>Is the staff ready? No? Oh, okay. I''m s-so nervous about the test...'
      complete: '<aqua>Apprentice Elara: <white>It''s beautiful! I... I feel stronger already! Thank you for believing in me, {player}!'
    requirements:
      - type: CRAFT_ITEM
        target: Weapon_Staff_Crystal_Flame
        amount: 1
    rewards:
      - type: MONEY
        value: '600'
      - type: ITEM
        value: Weapon_Spellbook_Fire:1
  npc_roderick_1:
    name: Prove Your Valor
    description: Kill 10 Zombies to secure the perimeter.
    icon_id: Weapon_Longsword_Iron
    weight: 20.0
    messages:
      start: '<red>Cpt. Roderick: <white>HALT! You look like a warrior! The undead threaten our walls. Draw your blade and slay <green>10 Zombies<white>! FOR GLORY!'
      progress: '<red>Cpt. Roderick: <white>Is that all?! Only <green>{current}<white> fell before you? FIGHT HARDER!'
      complete: '<red>Cpt. Roderick: <white>HA HAH! I knew you had the heart of a lion! But the battle has only just begun!'
    requirements:
      - type: KILL_MOB
        target: Zombie,Zombie_Burnt,Zombie_Frost,Zombie_Sand,Zombie_Aberrant_Big,Zombie_Aberrant_Small,Zombie_Aberrant
        amount: 10
    rewards:
      - type: MONEY
        value: '100'
      - type: ITEM
        value: Weapon_Daggers_Iron:1
  npc_roderick_2:
    name: The Trork Threat
    description: Defeat 5 Trork Hunters in the forest.
    icon_id: Armor_Trork_Head
    weight: 21.0
    prerequisites:
      - npc_roderick_1
    messages:
      start: '<red>Cpt. Roderick: <white>The Zombies were merely a distraction! The TRORKS are massing in the woods! Strike them down! Defeat <green>5 Trork Hunters<white>!'
      progress: '<red>Cpt. Roderick: <white>Do not let them regroup! You have only defeated <green>{current}<white>! PRESS THE ATTACK!'
      complete: '<red>Cpt. Roderick: <white>MAGNIFICENT! Their lines are broken! You fight like a true champion of the Vanguard!'
    requirements:
      - type: KILL_MOB
        target: Trork_Hunter
        amount: 5
    rewards:
      - type: MONEY
        value: '250'
      - type: ITEM
        value: Armor_Iron_Chest:1
      - type: ITEM
        value: Armor_Iron_Legs:1
  npc_roderick_3:
    name: Champion of the Arena
    description: Kill a Chieftain Trork.
    icon_id: Deco_Trork_Cage
    weight: 22.0
    prerequisites:
      - npc_roderick_2
    messages:
      start: '<red>Cpt. Roderick: <white>One final test! To become a Legend, you must face the strongest! Defeat a <green>Chieftain Trork<white> and claim your destiny!'
      progress: '<red>Cpt. Roderick: <white>Victory awaits! Do not falter now!'
      complete: '<red>Cpt. Roderick: <white>BY THE GODS! A new legend is born today! All hail {player}, the Champion of the Realm!'
    requirements:
      - type: KILL_MOB
        target: Trork_Chieftain
        amount: 1
    rewards:
      - type: MONEY
        value: '1000'
      - type: COMMAND
        value: broadcast {player} has been named Champion by Captain Roderick!
        display_name: 'Title: Champion'
chains:
  production_chain:
    name: Farm Assistance
    quests:
      - npc_silas_1
      - npc_silas_2
      - npc_silas_3
    messages:
      already_completed: '<gold>Old Man Silas: <white>You''ve done everything I needed, kid. Farm''s runnin'' smooth thanks to you. Now git!'
  magic_chain:
    name: Arcane Studies
    quests:
      - npc_elara_1
      - npc_elara_2
      - npc_elara_3
    messages:
      already_completed: '<aqua>Apprentice Elara: <white>O-oh, hello again! I don''t have any more tasks right now... b-but thank you for everything!'
  combat_chain:
    name: Vanguard Defense
    quests:
      - npc_roderick_1
      - npc_roderick_2
      - npc_roderick_3
    messages:
      already_completed: '<red>Cpt. Roderick: <white>You''ve already proven yourself, Champion! There are no more trials for you here. Go forth and conquer!'
