# Storage backend: "file" (default) or "mysql"
# "file" stores player data as JSON files in the data/ folder
# "mysql" uses a MySQL database (enables cross-server data sharing)
storage:
  type: file
  mysql:
    host: localhost
    port: 3306
    database: talequests
    username: root
    password: ""
    table_prefix: "tq_"
    pool:
      max_size: 10
      min_idle: 2
      connection_timeout: 5000
      max_lifetime: 1800000

debug: false
language: en
completion_message_type: TITLE
show_quest_started_title: true
# Quest progress notification type: CHAT, NOTIFICATION, BOTH, NONE
# CHAT = text message in chat, NOTIFICATION = item pickup style popup, BOTH = both, NONE = disabled
progress_notify_type: CHAT
# Progress notification interval (percentage): 25 = every 25%, 10 = every 10%, 0 = disabled
progress_notify_percent: 25
# NPC quest progress notification type: NOTIFICATION, CHAT, BOTH, NONE
npc_progress_notify_type: NOTIFICATION
# NPC progress notification interval (percentage): 25 = every 25%, 10 = every 10%, 0 = disabled
npc_progress_notify_percent: 25
# Reward notification type: CHAT, NOTIFICATION, BOTH, NONE
# Controls how money/item reward messages are delivered to the player
reward_notify_type: CHAT
quest_command: true
quest_gui:
  enable_hide_completed_toggle: true
  show_category_dropdown: true
  show_required_quest_name: true
  hide_completed_npc_quests: false
  # Hide quests whose prerequisites are not met (LOCKED status) from the quest list
  hide_locked_quests: false
  # Enable clicking a quest in the menu to open its detail page
  quest_detail_click_enabled: true
  # Auto-open quest detail page when an NPC quest is started or progress is reported
  quest_detail_npc_auto_open: true
  # Icons for requirement types in the quest detail page (used when target is not an item)
  requirement_type_icons:
    kill_mob: "Weapon_Sword_Iron"
    kill_player: "Weapon_Sword_Iron"
    chat_message: "Recipe_Page"
  modules:
    quests:
      name: "Quests"
      description: "Main story and side quests"
      icon_id: "Weapon_Spellbook_Fire"
    pools:
      name: "Daily & Weekly"
      description: "Rotating challenges with special rewards"
      icon_id: "Tool_Pickaxe_Iron"
    npc:
      name: "NPC Quests"
      description: "Special quests from NPCs"
      icon_id: "Recipe_Page"
currency:
  symbol: "$"
  format: "{symbol}{amount}"
  icon_id: "Coin_Gold"
block_tracker:
  enabled: true
  ttl_minutes: 300
